<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
    <!-- Bootstrap live link in CDN -->
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body class="d-flex p-5">
  <div class="card-header flex-row  ">
    <h1 class="list-unstyled text-center">SSLC Subjects</h1>
    <h4>Grade Calculator</h4>
    <p>only run in console to view in output score in subject & total marks and Average</p>
    <div class="card-text list-unstyled">
    <li>Tamil</li>
    <li>English</li>
    <li>Maths</li>
    <li>Science</li>
    <li>Sociel</li>

    </div>
    
    <div class="card-text list-unstyled">
      <h5>Calculate</h5>
    <li>Total Marks</li>
    <li>Average to Grade value</li>
    </div>
    </div>
    <script>  
      const Tamil =parseInt(prompt("Enter Your Tamil Mark Value:"));
      const English =parseInt(prompt("Enter Your English Mark Value:"));
      const Maths=parseInt(prompt("Enter Your Maths Mark Value:"));
      const Science=parseInt(prompt("Enter Your Science Mark Value:"));
      const Social=parseInt(prompt("Enter Your Social Mark Value:"));
if(Tamil<=100 && English<=100 && Maths<=100 && Science <=100 && Social<=100 ){

console.log("mark in Tamil subject : "+Tamil);
console.log("mark in English subject : "+English);
console.log("mark in Maths subject : "+Maths);
console.log("mark in Science subject : "+Science);
console.log("mark in Sociel subject : "+Social);
  let Total = (Tamil+English+Maths+Science+Social);
  console.log("Total mark is :"+Total); 
/*
Total number of subject is = 5
Average formula = (Total Mark/No of subject)
*/
  let average=(Total/5);
//   Calculate the average in all subjects
  console.log(average);
  if(average >=90 && average<=100){
    console.log("'A' Grade : My average score is :" +average);
  }
  else if(average >= 75 && average <90){
    console.log("'B' Grade : My average score is :" +average);
  }
  else if(average >= 60 && average <75){
    console.log("'c' Grade : My average score is :" +average);
  }
  else if(average >= 40 && average <60){
    console.log("'D' Grade : My average score is :" +average);
  }
  else{
    console.log("'Fail' Grade : My average score is :" +average);

  }
  }
  else{
    console.log("enter the value graterthan 100 is not valid the the grade calculater form");
  }
  

    </script>
</body>
</html>
